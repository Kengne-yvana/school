version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: school2-postgres
    environment:
      POSTGRES_DB: schoolapi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fineract
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: school2-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/schoolapi
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: fineract
      JWT_SECRET: mySecretKey
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: